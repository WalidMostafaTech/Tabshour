<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- contact-icons-section -->
    <div id="contact-icons-section"></div>

    <!-- navbar -->
    <div id="navbar"></div>

    <main class="container" style="min-height: 100dvh; padding-top: 6rem">
      <hgroup class="section-header mb-4">
        <span>مميزات طبشور</span>
        <h4 class="section-header-title">تعرف علي وجهة طبشور التعليمية</h4>
      </hgroup>

      <section class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col">
          <div
            class="card blog-card h-100 border-0 custom-card shadow-sm rounded-3 overflow-hidden"
          >
            <div class="card-img">
              <img src="assets/images/product-image.png" alt="LMS" />
            </div>

            <div class="card-body">
              <h6 class="card-title text-primary mb-3">
                نظام إدارة تعلم احترافي (LMS)
              </h6>
              <p class="card-text" style="font-size: 12px; line-height: 2.2">
                هل تواجه صعوبة في إدارة التدريب والتعليم داخل مؤسستك وتبحث عن
                نظام إدارة تعلم احترافي...
              </p>
            </div>

            <div
              class="card-footer bg-white border-0 d-flex justify-content-between align-items-center pb-3"
            >
              <div class="card-meta small d-flex gap-3" style="font-size: 12px">
                <p class="d-flex align-items-center gap-2 m-0">
                  <i class="bi bi-calendar3 fs-5"></i> 2025 / 10 / 10
                </p>
                <p class="d-flex align-items-center gap-2 m-0">
                  <i class="bi bi-clock-fill fs-5"></i>
                  10:10 صباحاً
                </p>
              </div>

              <a
                href="blog-details.html"
                class="text-secondary"
                style="font-size: 11px; text-decoration: underline"
                >اقرأ المزيد</a
              >
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
