<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main
      style="
        min-height: 100dvh;
        padding: 12px;
        padding-block: 6rem;
        background: url(/assets/images/bg-image.png) no-repeat center center;
        background-size: cover;
      "
      class="d-flex justify-content-center align-items-center"
    >
      <div
        class="d-flex flex-column justify-content-center gap-3 w-100"
        style="max-width: 600px"
      >
        <img
          src="assets/images/logo.png"
          alt="Logo"
          class="mb-5 mx-auto"
          style="width: 120px"
        />

        <div class="text-center">
          <h4 class="text-primary mb-3">استعادة كلمة المرور</h4>
          <p class="text-primary">نتمني لك تجربة ممتازة مع خدماتنا في طبشور</p>
        </div>

        <form class="login-form">
          <div class="mb-3">
            <label class="form-label">البريد الإلكتروني</label>
            <input
              type="email"
              class="form-control"
              placeholder="اكتب بريدك هنا"
              required
            />
          </div>

          <button type="submit" class="main-btn w-100">
            ارسال رابط لتغيير كلمة المرور
          </button>
        </form>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
